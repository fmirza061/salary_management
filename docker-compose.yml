services:
  web:
    build: .
    working_dir: /app   # 👈 IMPORTANT FIX
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true

volumes:
  bundle_data: